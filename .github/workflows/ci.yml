# NOTE: The `name:` field below ("CI/CD Pipeline") is a Pattern 73 SSOT.
# If any workflow uses `workflow_run.workflows:` to trigger on this pipeline,
# renaming `name:` here without a lockstep update silently breaks the trigger:
# the workflow keeps running, but the dependent workflow_run trigger stops
# firing with no error. See claude-code-review.yml for the canonical design
# note on this constraint.
name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

# Concurrency: cancel in-progress runs when a new push lands on the same ref.
# This is the single biggest GHA-minutes saver — PRs typically receive multiple
# pushes (rebases, fixups), and each push currently restarts the matrix from
# scratch while the previous run continues to consume runners. Cancel-in-progress
# kills the stale work; only the latest push's CI counts. Per-PR savings: ~60-80%
# on PRs with 3+ pushes.
#
# `github.head_ref || github.ref` keys on the PR's source branch when on a PR
# event, falling back to the push ref. PR pushes group together by branch
# (cancel each other on the same PR). Main-branch pushes also group together
# (cancel each other on `refs/heads/main`) — acceptable because the latest
# main commit gets a clean run, and pre-merge CI on the PR already validated
# the code; main-push CI is a fresh-environment safety net, not the gate.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

# Required permissions for mikepenz/action-junit-report to create check runs
permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # Detect which files changed to optimize CI runs
  detect-changes:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check changed files
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - 'requirements.txt'
              - 'pyproject.toml'
              - '.github/workflows/**'
            docs:
              - 'docs/**'
              - '**.md'
              - 'scripts/validate_docs.py'
              - 'scripts/fix_docs.py'

  pre-commit-checks:
    name: Pre-commit Validation (Ruff, Mypy, Security)
    runs-on: ubuntu-latest
    needs: detect-changes
    # Run if code changed OR if manually triggered
    if: needs.detect-changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for --from-ref diff

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          allow-prereleases: true

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .  # Install precog package (src/ layout)
          pip install pre-commit

      - name: Run pre-commit hooks (changed files only)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # PR: check only files changed vs base branch
            pre-commit run --from-ref ${{ github.event.pull_request.base.sha }} --to-ref ${{ github.event.pull_request.head.sha }}
          else
            # Push to main or workflow_dispatch: check all files
            pre-commit run --all-files
          fi

  security-scan:
    name: Security Scanning (Ruff & Safety)
    runs-on: ubuntu-latest
    needs: detect-changes
    # Run if code changed OR if manually triggered
    if: needs.detect-changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install safety

      - name: Run Ruff security scanner
        # S101=assert, S112=try-except-continue, S607=partial-path, S603=subprocess-call
        # S608=hardcoded-sql-expression (validated with allowlists in migrations)
        # S110=try-except-pass (logged in migration_utils.py)
        # S602=subprocess-shell (shell=True safe for trusted scripts with hardcoded commands)
        # S314=xml-parse (trusted local JUnit XML from pytest, not untrusted external data)
        run: python -m ruff check --select S --ignore S101,S112,S314,S607,S603,S608,S110,S602 --exclude 'tests/' --exclude '_archive/' --exclude 'venv/' .

      - name: Run Safety dependency vulnerability scanner
        run: python -m safety check --json
        continue-on-error: true

  documentation-validation:
    name: Documentation Validation
    runs-on: ubuntu-latest
    needs: detect-changes
    # Always run docs validation (fast and important for all changes)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Run documentation validation (YAML config + config sync)
        run: |
          python scripts/validate_docs.py

  test:
    name: Tests (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: detect-changes
    # Only run expensive test suite if code changed
    if: needs.detect-changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        # Linux-only, Python 3.14 only as of session 73 GHA-minutes reduction.
        # History:
        # - Pre-#685: Linux + Windows on PR (Windows = ~43% of PR billable minutes
        #   via 2x multiplier). #685 dropped Windows from PR matrix → kept on
        #   push-to-main only via test-windows-main job (line 240+ below).
        # - Pre-session 73: Linux 3.14 + Linux 3.12 (backward-compat target).
        # - Session 73 (this change): Dropped 3.12 from the PR matrix.
        #   Production deploys to Python 3.14 only; 3.12 backward-compat is no
        #   longer a real deployment target. Pre-push hook
        #   (scripts/pre-push-validation.sh) still runs against the developer's
        #   local Python (typically 3.14), and the push-to-main path runs
        #   test-windows-main on a fresh runner — both safety nets remain.
        #   Per-PR savings: ~50% of test-job billable minutes (was 2 jobs, now 1).
        # If multi-version backward compat becomes a real target again, restore
        # the matrix entry below and consider a separate "test-py312-main-only"
        # job following the test-windows-main pattern (gated to push-on-main).
        include:
          - os: ubuntu-latest
            python-version: '3.14'
      fail-fast: false

    # Environment safety (Issue #161): Explicitly set test environment
    env:
      PRECOG_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .  # Install precog package (src/ layout)
          pip install pytest pytest-cov pytest-xdist

      - name: Run tests (unit + property) - Cross-platform, no PostgreSQL
        run: |
          # Run tests that don't require PostgreSQL (aligned across Windows/Linux)
          # Unit tests: All mocked, no external dependencies
          # Property tests: Most use Hypothesis for data generation, mocked DB
          # NOTE: Database-dependent property tests run in integration-tests job with PostgreSQL:
          #       - test_crud_operations_properties.py
          #       - test_database_crud_properties.py
          #       - test_strategy_versioning_properties.py
          #       - database/test_series_crud_properties.py
          # Integration/E2E/stress/chaos tests need PostgreSQL - run in Linux-only job
          # Issue #238: Added --junitxml for GitHub PR annotations
          python -m pytest tests/unit/ tests/property/ -v --tb=short --junitxml=test-results.xml --cov=src/precog --cov-report=xml --cov-report=html --cov-report=term-missing -n auto --ignore=tests/property/test_crud_operations_properties.py --ignore=tests/property/test_database_crud_properties.py --ignore=tests/property/test_strategy_versioning_properties.py --ignore=tests/property/database/test_series_crud_properties.py

      - name: Publish Test Results
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: 'test-results.xml'
          check_name: 'Test Results (${{ matrix.os }}, Python ${{ matrix.python-version }})'
          fail_on_failure: false
          include_passed: false

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            test-results.xml
            test_results/
            htmlcov/
            coverage.xml
          retention-days: 7

  test-windows-main:
    # Windows test job — runs ONLY on push to main, NOT on pull_request.
    # Preserves the fresh-environment-runner safety net (catches CRLF/LF
    # issues, missing implicit deps, path assumptions that work on the
    # developer's accumulated-state Windows workstation but not on a
    # clean runner) at zero PR-cost.
    #
    # Why this is separate from the `test:` job above instead of a matrix
    # entry: GitHub Actions does not support per-matrix-include `if:`
    # conditionals. The cleanest pattern is two jobs with different `if:`
    # gates at the job level.
    #
    # Why this exists at all: Claude Review on #697 (PR #685 partial)
    # escalated 3 concerns about full Windows removal:
    #   1. Single-Windows-developer assumption (hypothetical multi-contributor)
    #   2. Pre-push hook bypass via --no-verify (discipline issue)
    #   3. Fresh CI runner vs developer workstation differences (real)
    # This job addresses concern #3 by running Windows on main post-merge.
    # Concerns #1 and #2 remain documented but unaddressed.
    name: Tests (Python 3.14 on windows-latest, main only)
    runs-on: windows-latest
    needs: detect-changes
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect-changes.outputs.code == 'true')
      || github.event_name == 'workflow_dispatch'

    # Environment safety (Issue #161): Explicitly set test environment
    env:
      PRECOG_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          allow-prereleases: true

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-3.14-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.14-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .  # Install precog package (src/ layout)
          pip install pytest pytest-cov pytest-xdist

      - name: Run tests (unit + property) - Windows fresh-runner verification
        run: |
          python -m pytest tests/unit/ tests/property/ -v --tb=short --junitxml=test-results.xml --cov=src/precog --cov-report=xml --cov-report=html --cov-report=term-missing -n auto --ignore=tests/property/test_crud_operations_properties.py --ignore=tests/property/test_database_crud_properties.py --ignore=tests/property/test_strategy_versioning_properties.py --ignore=tests/property/database/test_series_crud_properties.py

      - name: Publish Test Results
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: 'test-results.xml'
          check_name: 'Test Results (windows-latest, Python 3.14, main only)'
          fail_on_failure: false
          include_passed: false

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-windows-latest-py3.14-main
          path: |
            test-results.xml
            test_results/
            htmlcov/
            coverage.xml
          retention-days: 7

  integration-tests:
    name: Integration Tests (PostgreSQL)
    runs-on: ubuntu-latest
    needs: detect-changes
    # Only run if code changed (requires database)
    if: needs.detect-changes.outputs.code == 'true' || github.event_name == 'workflow_dispatch'
    # Job timeout (reduced: stress/chaos moved to parallel job)
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: precog_test
          POSTGRES_PASSWORD: precog_test_password
          POSTGRES_DB: precog_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Environment safety (Issue #161): Explicitly set test environment
      PRECOG_ENV: test
      # Database connection for tests
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: precog_test
      DB_USER: precog_test
      DB_PASSWORD: precog_test_password

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          allow-prereleases: true

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .  # Install precog package (src/ layout)
          pip install pytest pytest-cov hypothesis vcrpy pytest-timeout

      - name: Apply database migrations with Alembic
        run: |
          # Alembic manages all schema migrations with proper version tracking
          # This replaces the previous manual SQL + Python migration approach
          # See ADR-030 for migration framework decision
          cd src/precog/database
          echo "Running Alembic migrations..."
          alembic upgrade head
          echo "Alembic migrations complete"

          # Verify migration applied successfully
          alembic current

      - name: Clear Hypothesis example cache (prevents stale data issues)
        run: |
          # Clear cached Hypothesis examples that may conflict with current schema
          # This prevents "UniqueViolation" and "CheckViolation" errors from stale cached data
          # See ADR-057: Testcontainers for Database Test Isolation
          rm -rf .hypothesis/examples || true
          echo "Hypothesis cache cleared"

      - name: Run database-dependent property tests
        timeout-minutes: 10
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          # Property tests that require real PostgreSQL (SCD Type-2, Decimal precision, strategy versioning, series CRUD)
          # --timeout=120: Kill individual tests that hang for >2 minutes
          # Issue #238: Added --junitxml for GitHub PR annotations
          echo "=== Starting property tests at $(date) ==="
          python -m pytest tests/property/test_crud_operations_properties.py tests/property/test_database_crud_properties.py tests/property/test_strategy_versioning_properties.py tests/property/database/test_series_crud_properties.py -v --tb=short --timeout=120 --junitxml=property-test-results.xml
          echo "=== Property tests complete at $(date) ==="

      # Phase 1.9 DIAGNOSTIC: Split into separate steps to identify hang source
      - name: Run integration tests (database CRUD)
        timeout-minutes: 5
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          # Issue #238: Added --junitxml for GitHub PR annotations
          echo "=== Starting integration tests at $(date) ==="
          python -m pytest tests/integration/ -v --tb=short --timeout=60 -p no:cacheprovider --junitxml=integration-test-results.xml
          echo "=== Integration tests complete at $(date) ==="

      - name: Run security tests
        timeout-minutes: 3
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          # Issue #238: Added --junitxml for GitHub PR annotations
          echo "=== Starting security tests at $(date) ==="
          python -m pytest tests/security/ -v --tb=short --timeout=60 -p no:cacheprovider --junitxml=security-test-results.xml
          echo "=== Security tests complete at $(date) ==="

      - name: Run E2E + performance tests
        timeout-minutes: 5
        run: |
          # E2E tests will skip if API credentials not configured
          # Performance tests validate speed requirements
          # --timeout=60: Kill individual tests that hang for >1 minute
          # Issue #238: Added --junitxml for GitHub PR annotations
          python -m pytest tests/e2e/ tests/performance/ -v --tb=short --timeout=60 --junitxml=e2e-performance-test-results.xml

      # Issue #238: Publish test results as PR annotations
      - name: Publish Integration Test Results
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: '*-test-results.xml'
          check_name: 'Integration Test Results (PostgreSQL)'
          fail_on_failure: false
          include_passed: false

      # Issue #238: Upload all test artifacts on failure for debugging
      - name: Archive test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results-failure
          path: |
            *-test-results.xml
            .hypothesis/
          retention-days: 14

  # NOTE: Stress/chaos tests run in pre-push hook only (~992 tests, ~2 min locally).
  # They hang on CI runners (threading + 2 vCPUs). No CI job needed.

  # NOTE: validate-quick removed — it was a strict subset of pre-commit-checks
  # (ruff lint + ruff format + mypy, all covered by pre-commit run --all-files)

  # Test Type Coverage Audit job removed in session 63 (#887) — moved to
  # scripts/pre-push-validation.sh as a fast-fail structural gate. The CI job
  # had run with continue-on-error: true for months, muting the signal into
  # invisibility; pre-push enforcement restores author-time feedback.

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [pre-commit-checks, security-scan, documentation-validation, test, integration-tests]
    if: always()
    steps:
      - name: Check all jobs status
        run: |
          echo "=========================================="
          echo "CI Pipeline Summary"
          echo "=========================================="
          echo "Pre-commit Checks:        ${{ needs.pre-commit-checks.result }}"
          echo "Security Scan:            ${{ needs.security-scan.result }}"
          echo "Documentation Validation: ${{ needs.documentation-validation.result }}"
          echo "Unit Tests:               ${{ needs.test.result }}"
          echo "Integration Tests:        ${{ needs.integration-tests.result }}"
          echo "Stress & Chaos Tests:     pre-push only (threading hangs on CI runners)"
          echo "Test Type Coverage:       pre-push only (#887 migrated from CI)"
          echo "=========================================="

          # Check if any job that actually ran failed (skipped jobs are OK)
          if [[ "${{ needs.pre-commit-checks.result }}" == "failure" ]] || \
             [[ "${{ needs.security-scan.result }}" == "failure" ]] || \
             [[ "${{ needs.documentation-validation.result }}" == "failure" ]] || \
             [[ "${{ needs.test.result }}" == "failure" ]] || \
             [[ "${{ needs.integration-tests.result }}" == "failure" ]]; then
            echo ""
            echo "❌ CI FAILED: One or more checks failed"
            echo ""
            exit 1
          fi

          # Count how many jobs were skipped (due to path filtering)
          SKIPPED=0
          [[ "${{ needs.pre-commit-checks.result }}" == "skipped" ]] && ((SKIPPED+=1))
          [[ "${{ needs.security-scan.result }}" == "skipped" ]] && ((SKIPPED+=1))
          [[ "${{ needs.test.result }}" == "skipped" ]] && ((SKIPPED+=1))
          [[ "${{ needs.integration-tests.result }}" == "skipped" ]] && ((SKIPPED+=1))

          echo ""
          if [[ $SKIPPED -gt 0 ]]; then
            echo "✅ CI PASSED: All required checks successful ($SKIPPED job(s) skipped due to path filtering)"
          else
            echo "✅ CI PASSED: All checks successful!"
          fi
          echo ""
