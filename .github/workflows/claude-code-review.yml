name: Claude Code Review

# ============================================================================
# DESIGN NOTE — DO NOT replace pull_request with workflow_run("CI/CD Pipeline")
# ============================================================================
#
# Session 81 attempted (PR #1088) to swap this trigger to `workflow_run` so
# claude-review would only fire AFTER CI/CD Pipeline completed successfully —
# motivated by PR #1084 hitting 3 separate claude-reviews across iterative
# pushes. The change merged but **silently broke claude-review on every
# subsequent PR**.
#
# Empirical finding: GitHub's `workflow_run` trigger does NOT fire reliably
# for source-workflow runs that complete on PR feature branches. It fires
# only for source-workflow completions on the default branch (post-merge
# main pushes). Pre-merge PR CI completions surface as workflow_run events
# only intermittently / not at all in same-repo PR scenarios — the docs
# imply they should but empirically they do not. PR #1090 (the very next
# PR) got zero claude-reviews; only post-merge main-push runs triggered
# the listener (which then correctly skipped because event != 'pull_request').
#
# **Reverted in PR #1091 (session 81).** Cost-savings goal (avoid review on
# broken pushes) was not achievable via workflow_run; future attempts must
# either use a different mechanism (e.g., a polling check inside the action
# that waits for CI status before running, or an explicit needs:-gated job
# inside ci.yml) or accept the multi-fire pattern that concurrency: cancel-
# in-progress already mitigates for rapid pushes.
#
# Issue #1086 (literal-string drift gate between ci.yml name + claude-review
# workflows: array) and #1087 (if-chain refactor) are still valid follow-ups;
# they were filed as part of PR #1088's design and remain useful even after
# revert.
#
# If a future engineer wants to retry "claude-review only after CI passes,"
# DO NOT use workflow_run as a same-repo PR trigger. Test the trigger on a
# throwaway branch with a draft PR FIRST, verifying that workflow_run does
# in fact fire for pre-merge PR CI completions, before landing anywhere
# near the canonical claude-review.yml.
# ============================================================================

on:
  pull_request:
    types: [opened, synchronize]
    # Skip claude-code-review on docs-only and memory-only PRs.
    # Reasoning (session 73 GHA-minutes reduction):
    # - Doc-only PRs (e.g., ADR amendments, README fixes, version bumps) get
    #   minimal signal from claude-review — most findings are cosmetic nitpicks
    #   already caught by pre-commit doc-version + ADR-drift gates.
    # - For mixed PRs (docs + code), the review still runs because the path
    #   filter only excludes when EVERY changed file matches paths-ignore.
    # - Per-PR savings: ~2 min per docs-only PR. Across a doc-heavy week
    #   (e.g., session 73 had 4 doc-only PRs), this is ~10 min/week.
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'memory/**'
      - '_archive/**'

# Concurrency: cancel in-progress claude-review when a new PR push lands.
# Latest push wins; stale reviews (which would post against an outdated diff)
# never complete. Saves ~2 min per cancelled run on rapid-iteration PRs.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Please review this pull request and provide feedback on:
            - Code quality and best practices
            - Potential bugs or issues
            - Performance considerations
            - Security concerns
            - Test coverage

            Use the repository's CLAUDE.md for guidance on style and conventions. Be constructive and helpful in your feedback.

            Use `gh pr comment` with your Bash tool to leave your review as a comment on the PR.

          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://docs.claude.com/en/docs/claude-code/cli-reference for available options
          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'
